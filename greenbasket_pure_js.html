<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GreenBasket</title>
</head>
<body>
<script>
(()=>{
const css = `:root{--bg:#f6f7f1;--card:#fff;--green:#4f6f3a;--green2:#7ea35c;--line:#dfe6d4;--text:#24301f;--muted:#66715f;--shadow:0 18px 40px rgba(36,48,31,.08)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Poppins,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text)}a{text-decoration:none;color:inherit}.topbar{background:#dce7c7;color:#4a5a2f;text-align:center;padding:8px 12px;font-size:13px;font-weight:600;letter-spacing:.04em}.nav{position:sticky;top:0;background:rgba(246,247,241,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);z-index:20}.nav-inner,.hero,.section,.foot{max-width:1200px;margin:auto;padding:0 20px}.nav-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 0}.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:22px;color:var(--green)}.brand-dot{width:10px;height:10px;border-radius:50%;background:var(--green2);box-shadow:0 0 0 6px rgba(126,163,92,.12)}.nav-links{display:flex;gap:24px;color:var(--text);font-weight:500}.nav-links a{opacity:.82}.nav-links a:hover{opacity:1;color:var(--green)}.search{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:10px 14px;min-width:280px;box-shadow:0 10px 25px rgba(0,0,0,.03)}.search input{border:0;outline:0;width:100%;font:inherit;background:transparent}.hero{padding:72px 20px 40px;display:grid;grid-template-columns:1.05fr .95fr;align-items:center;gap:30px}.hero h1{font-size:clamp(44px,6vw,84px);line-height:.96;letter-spacing:-.04em;margin:0 0 20px;color:var(--green)}.hero p{max-width:560px;font-size:18px;line-height:1.7;color:var(--muted);margin:0 0 28px}.btn{display:inline-flex;align-items:center;justify-content:center;background:var(--green);color:#fff;border:0;border-radius:999px;padding:15px 28px;font-size:16px;font-weight:600;cursor:pointer;box-shadow:var(--shadow)}.btn:hover{transform:translateY(-1px)}.hero-visual{position:relative;min-height:520px;display:flex;align-items:center;justify-content:center}.hero-visual::before{content:'';position:absolute;inset:10% 3% 8%;border-radius:38px;background:radial-gradient(circle at 68% 40%,rgba(126,163,92,.16),transparent 30%),linear-gradient(135deg,#fff 0%,#f8faf3 100%);box-shadow:var(--shadow)}.hero-visual img{position:relative;max-width:100%;height:auto;max-height:520px;object-fit:contain;filter:drop-shadow(0 20px 25px rgba(0,0,0,.12))}.section{padding:22px 20px}.panel{background:rgba(255,255,255,.72);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow)}.filters{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:18px}.field{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}.field label{display:block;font-size:12px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}.field input[type=range],.field select,.field input[type=text]{width:100%}.chips{display:flex;flex-wrap:wrap;gap:10px}.chip{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:999px;padding:9px 13px;font-size:14px;cursor:pointer}.chip.active{background:var(--green);color:#fff;border-color:var(--green)}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:18px}.stat{background:linear-gradient(180deg,#fff,#f8faf3);border:1px solid var(--line);border-radius:20px;padding:18px}.stat .k{font-size:28px;font-weight:700;color:var(--green)}.stat .l{font-size:13px;color:var(--muted);margin-top:4px}.title-row{display:flex;align-items:end;justify-content:space-between;gap:20px;margin:26px 0 14px}.title-row h2{margin:0;font-size:30px;color:var(--green)}.title-row p{margin:0;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}.card{background:#fff;border:1px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:var(--shadow);transition:transform .2s ease}.card:hover{transform:translateY(-4px)}.thumb{height:220px;background:#eef3e6;display:flex;align-items:center;justify-content:center;overflow:hidden}.thumb img{width:100%;height:100%;object-fit:cover}.card-body{padding:16px}.name{font-weight:700;font-size:18px;line-height:1.3;margin:0 0 8px}.meta{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 14px;color:var(--muted);font-size:13px}.badge{display:inline-flex;align-items:center;gap:6px;background:#edf5e6;color:var(--green);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:700}.price{font-size:22px;font-weight:700;color:var(--green);margin-top:8px}.actions{display:flex;gap:10px;margin-top:14px}.mini{flex:1;border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 12px;font-weight:600;cursor:pointer}.mini.primary{background:var(--green);color:#fff;border-color:var(--green)}.empty{padding:40px;text-align:center;color:var(--muted)}.foot{padding:26px 20px 42px;color:var(--muted);line-height:1.8}@media (max-width:1100px){.hero,.filters,.grid,.stats{grid-template-columns:repeat(2,1fr)}.hero{padding-top:36px}.hero-visual{min-height:420px}}@media (max-width:720px){.nav-inner{flex-wrap:wrap}.nav-links{display:none}.search{min-width:0;width:100%}.hero,.filters,.grid,.stats{grid-template-columns:1fr}.hero{padding-top:30px}.hero-visual{min-height:340px}.title-row{flex-direction:column;align-items:start}}`;
const style=document.createElement('style'); style.textContent=css; document.head.appendChild(style);
const app=document.createElement('div'); document.body.appendChild(app);
const products=[{name:'Organic Almond Milk',price:249,co2:1.1,category:'Food',material:'organic',img:'https://images.unsplash.com/photo-1505576633757-0ac1084af824?auto=format&fit=crop&w=800&q=80'},{name:'Bamboo Toothbrush',price:149,co2:0.4,category:'Personal Care',material:'bamboo',img:'https://images.unsplash.com/photo-1556228453-efd6c1ff04f6?auto=format&fit=crop&w=800&q=80'},{name:'Reusable Water Bottle',price:699,co2:0.8,category:'Home',material:'recycled',img:'https://images.unsplash.com/photo-1526401485004-2aa7d0bc3a33?auto=format&fit=crop&w=800&q=80'},{name:'Organic Cotton T-Shirt',price:999,co2:1.6,category:'Clothing',material:'organic',img:'https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&w=800&q=80'},{name:'Glass Food Container',price:449,co2:0.9,category:'Home',material:'recycled',img:'https://images.unsplash.com/photo-1606857521015-7f5d6c9b8f2f?auto=format&fit=crop&w=800&q=80'},{name:'Eco Soap Bar',price:129,co2:0.5,category:'Personal Care',material:'organic',img:'https://images.unsplash.com/photo-1584305574647-0cc10f4e3b4d?auto=format&fit=crop&w=800&q=80'},{name:'Bamboo Lunch Box',price:799,co2:1.0,category:'Home',material:'bamboo',img:'https://images.unsplash.com/photo-1600423115367-87ea7664e2ef?auto=format&fit=crop&w=800&q=80'},{name:'Recycled Notebook Pack',price:199,co2:0.3,category:'Home',material:'recycled',img:'https://images.unsplash.com/photo-1516542076529-1ea3854896f2?auto=format&fit=crop&w=800&q=80'},{name:'Organic Green Tea',price:349,co2:0.7,category:'Food',material:'organic',img:'https://images.unsplash.com/photo-1515823064-d6e0c04616a7?auto=format&fit=crop&w=800&q=80'},{name:'Hemp Tote Bag',price:599,co2:0.6,category:'Clothing',material:'hemp',img:'https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&w=800&q=80'},{name:'Wooden Comb',price:179,co2:0.4,category:'Personal Care',material:'wood',img:'https://images.unsplash.com/photo-1519699047748-de8e457a634e?auto=format&fit=crop&w=800&q=80'},{name:'Compostable Kitchen Wrap',price:289,co2:0.2,category:'Home',material:'compostable',img:'https://images.unsplash.com/photo-1505576633757-0ac1084af824?auto=format&fit=crop&w=800&q=80'}];
const fmt=new Intl.NumberFormat('en-IN',{style:'currency',currency:'INR',maximumFractionDigits:0});
const state={search:'',price:5000,co2:10,category:'all',materials:new Set([...new Set(products.map(p=>p.material))])};
app.innerHTML=`<div class='topbar'>FREE SHIPPING ON ORDERS OVER ₹5,999</div><header class='nav'><div class='nav-inner'><div class='brand'><span class='brand-dot'></span>GreenBasket</div><nav class='nav-links'><a href='#products'>Products</a><a href='#filters'>Filters</a><a href='#about'>About</a></nav><div class='search'><span>⌕</span><input id='search' type='text' placeholder='Search eco products'></div></div></header><main><section class='hero'><div><h1>Fresh picks for a greener basket</h1><p>Discover low-impact products with real images, rupee pricing, and simple sustainability filters. GreenBasket recommends eco-friendly items based on price, material, and carbon footprint.</p><button class='btn' id='shopBtn'>Shop eco products</button></div><div class='hero-visual'><img alt='Eco product hero' src='https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=1200&q=80'></div></section><section id='filters' class='section'><div class='panel filters'><div class='field'><label>Max price</label><input id='priceRange' type='range' min='0' max='5000' value='5000'></div><div class='field'><label>Max carbon footprint</label><input id='co2Range' type='range' min='0' max='10' step='0.1' value='10'></div><div class='field'><label>Category</label><select id='category'><option value='all'>All</option><option value='Food'>Food</option><option value='Home'>Home</option><option value='Personal Care'>Personal Care</option><option value='Clothing'>Clothing</option></select></div><div class='field'><label>Materials</label><div class='chips' id='materials'></div></div></div><div class='stats' id='stats'></div></section><section id='products' class='section'><div class='title-row'><div><h2>Recommended products</h2><p>Sorted by lowest impact first.</p></div><p id='countText'></p></div><div id='grid' class='grid'></div></section><section id='about' class='section'><div class='panel' style='padding:22px;line-height:1.75;color:var(--muted)'><strong style='color:var(--green)'>Web demo:</strong> This page is a working prototype built fully with JavaScript DOM creation. It uses real product-style images, live filtering, and Indian rupee formatting for a realistic presentation.</div></section><footer class='foot'>GreenBasket • Sustainable shopping demo made entirely with JavaScript.</footer></main>`;
const els={grid:document.getElementById('grid'),stats:document.getElementById('stats'),countText:document.getElementById('countText'),search:document.getElementById('search'),priceRange:document.getElementById('priceRange'),co2Range:document.getElementById('co2Range'),category:document.getElementById('category'),materials:document.getElementById('materials')};
const mats=[...new Set(products.map(p=>p.material))]; els.materials.innerHTML=mats.map(m=>`<button class='chip active' data-m='${m}'>${m}</button>`).join('');
function filtered(){return products.filter(p=>p.name.toLowerCase().includes(state.search.toLowerCase())&&p.price<=state.price&&p.co2<=state.co2&&(state.category==='all'||p.category===state.category)&&state.materials.has(p.material));}
function render(){const list=filtered().sort((a,b)=>a.co2-b.co2); els.grid.innerHTML=list.length?list.map(p=>`<article class='card'><div class='thumb'><img loading='lazy' src='${p.img}' alt='${p.name}'></div><div class='card-body'><div class='badge'>♻ Low impact • ${p.co2.toFixed(1)} kg CO₂</div><p class='name'>${p.name}</p><div class='meta'><span>${p.category}</span><span>${p.material}</span></div><div class='price'>${fmt.format(p.price)}</div><div class='actions'><button class='mini' onclick="navigator.clipboard.writeText('${p.name}')">Copy</button><button class='mini primary'>View</button></div></div></article>`).join(''):'<div class="empty">No products match these filters.</div>'; const avg=list.length?(list.reduce((a,b)=>a+b.co2,0)/list.length).toFixed(1):'0.0'; els.countText.textContent=`${list.length} items found`; els.stats.innerHTML=[[`${list.length}`,'Products shown'],[`${avg} kg`,'Average CO₂ per item'],[`${fmt.format(list.reduce((a,b)=>a+b.price,0))}`,'Total value'],[`${state.materials.size}`,'Materials selected']].map(([k,l])=>`<div class='stat'><div class='k'>${k}</div><div class='l'>${l}</div></div>`).join('');}
const sync=()=>render(); els.search.addEventListener('input',()=>{state.search=els.search.value;sync()}); els.priceRange.addEventListener('input',()=>{state.price=+els.priceRange.value;sync()}); els.co2Range.addEventListener('input',()=>{state.co2=+els.co2Range.value;sync()}); els.category.addEventListener('input',()=>{state.category=els.category.value;sync()}); document.addEventListener('click',e=>{if(e.target.classList.contains('chip')){const m=e.target.dataset.m;state.materials.has(m)?state.materials.delete(m):state.materials.add(m);e.target.classList.toggle('active');sync();}}); document.getElementById('shopBtn').onclick=()=>document.getElementById('products').scrollIntoView({behavior:'smooth'}); render();
})();
</script>
</body>
</html>
